version: 2

project_name: ai

builds:
  - id: ai
    main: ./cmd/ai
    binary: ai
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/bluefunda/cai-cli/internal/cmd.Version={{ .Version }}
    flags:
      - -trimpath

archives:
  - id: ai
    name_template: "ai_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
      - zip
    format_overrides:
      - goos: darwin
        formats:
          - zip
      - goos: linux
        formats:
          - tar.gz
    files:
      - none*

nfpms:
  - id: ai
    package_name: ai
    ids:
      - ai
    vendor: Bluefunda
    maintainer: Bluefunda <support@bluefunda.com>
    description: Cross-platform CLI for the CAI platform via gRPC.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /opt/ai/bin
    contents:
      - dst: /opt/ai/etc
        type: dir
      - dst: /opt/ai/log
        type: dir
      - dst: /usr/local/bin/ai
        src: /opt/ai/bin/ai
        type: symlink

brews:
  - name: ai
    ids:
      - ai
    homepage: https://github.com/bluefunda/cai-cli
    description: CLI for BlueFunda AI — context-aware AI agents for SAP operations
    license: MIT
    directory: Formula
    repository:
      owner: bluefunda
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    test: |
      system "#{bin}/ai", "version"

homebrew_casks:
  - name: ai
    ids:
      - ai
    binaries:
      - ai
    homepage: https://github.com/bluefunda/cai-cli
    description: CLI for BlueFunda AI — context-aware AI agents for SAP operations
    directory: Casks
    repository:
      owner: bluefunda
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: bluefunda
    name: cai-cli
  draft: false
  replace_existing_draft: true
  name_template: "AI CLI v{{ .Version }}"
  header: |
    ## AI CLI v{{ .Version }}

    Cross-platform CLI for the CAI platform via gRPC.

    ### Installation

    **Homebrew (macOS and Linux):**
    ```bash
    brew tap bluefunda/tap
    brew install ai
    ```

    **Debian/Ubuntu (x86_64):**
    ```bash
    curl -sL https://github.com/bluefunda/cai-cli/releases/download/v{{ .Version }}/ai_{{ .Version }}_linux_amd64.deb -o ai.deb
    sudo dpkg -i ai.deb
    ```

    **Debian/Ubuntu (ARM64):**
    ```bash
    curl -sL https://github.com/bluefunda/cai-cli/releases/download/v{{ .Version }}/ai_{{ .Version }}_linux_arm64.deb -o ai.deb
    sudo dpkg -i ai.deb
    ```

    **RPM-based (x86_64):**
    ```bash
    sudo rpm -i https://github.com/bluefunda/cai-cli/releases/download/v{{ .Version }}/ai_{{ .Version }}_linux_amd64.rpm
    ```

    **RPM-based (ARM64):**
    ```bash
    sudo rpm -i https://github.com/bluefunda/cai-cli/releases/download/v{{ .Version }}/ai_{{ .Version }}_linux_arm64.rpm
    ```

    **macOS (manual):**
    ```bash
    curl -sL https://github.com/bluefunda/cai-cli/releases/download/v{{ .Version }}/ai_{{ .Version }}_darwin_arm64.zip -o ai.zip
    unzip ai.zip && chmod +x ai && sudo mv ai /usr/local/bin/
    ```

    **Linux (manual):**
    ```bash
    curl -sL https://github.com/bluefunda/cai-cli/releases/download/v{{ .Version }}/ai_{{ .Version }}_linux_amd64.tar.gz | tar xz
    chmod +x ai && sudo mv ai /usr/local/bin/
    ```

snapshot:
  version_template: "{{ incpatch .Version }}-next"
