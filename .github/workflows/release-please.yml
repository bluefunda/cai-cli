name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    uses: bluefunda/release-foundry/.github/workflows/release-please.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  goreleaser:
    needs: release
    if: ${{ needs.release.outputs.release_created }}
    uses: bluefunda/release-foundry/.github/workflows/go-binary-release.yml@main
    with:
      tag: ${{ needs.release.outputs.tag_name }}
    permissions:
      contents: write
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  docker:
    needs: release
    if: ${{ needs.release.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ needs.release.outputs.tag_name }}
          tags: |
            bluefunda/cai-cli:${{ needs.release.outputs.tag_name }}
            bluefunda/cai-cli:latest
            ghcr.io/bluefunda/cai-cli:${{ needs.release.outputs.tag_name }}
            ghcr.io/bluefunda/cai-cli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: bluefunda/cai-cli
          readme-filepath: ./README.md
          short-description: "AI CLI — context-aware AI agents for SAP operations"

  homebrew-patch:
    needs: [release, goreleaser]
    if: ${{ needs.release.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Patch Homebrew cask with API asset URLs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.release.outputs.tag_name }}
        run: |
          # cai-cli is public — GITHUB_TOKEN is sufficient to read releases
          assets=$(GH_TOKEN="$GITHUB_TOKEN" gh api "repos/bluefunda/cai-cli/releases/tags/${TAG}" \
            --jq '.assets[] | "\(.name) \(.id)"')

          # Use HOMEBREW_TAP_TOKEN to read/write homebrew-tap
          export GH_TOKEN="$HOMEBREW_TAP_TOKEN"

          # Download current cask from homebrew-tap
          gh api repos/bluefunda/homebrew-tap/contents/Casks/ai.rb \
            --jq '.content' | base64 -d > /tmp/ai.rb

          # Replace each browser_download_url with API asset URL
          while read -r name id; do
            old="https://github.com/bluefunda/cai-cli/releases/download/v#{version}/${name}"
            new="https://api.github.com/repos/bluefunda/cai-cli/releases/assets/${id}"
            sed -i "s|${old}|${new}|g" /tmp/ai.rb
          done <<< "$assets"

          # Replace 'Authorization: bearer' with 'Authorization: token' and add Accept header
          sed -i 's/Authorization: bearer/Authorization: token/g' /tmp/ai.rb
          sed -i '/Authorization: token/a\          "Accept: application/octet-stream",' /tmp/ai.rb

          # Get current file SHA (required for update API)
          file_sha=$(gh api repos/bluefunda/homebrew-tap/contents/Casks/ai.rb --jq '.sha')

          # Push patched cask
          content=$(base64 -w 0 /tmp/ai.rb)
          gh api repos/bluefunda/homebrew-tap/contents/Casks/ai.rb \
            -X PUT \
            -f message="fix: use API asset URLs for private repo downloads (${TAG})" \
            -f content="${content}" \
            -f sha="${file_sha}"
